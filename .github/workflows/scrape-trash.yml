name: Scrape trash pickup dates

on:
  schedule:
    # Midnight Helsinki time. GitHub cron is UTC and doesn't know DST, so
    # 22:00 UTC = 00:00 EET (winter) / 01:00 EEST (summer). Close enough.
    - cron: "0 22 * * *" # daily at midnight Helsinki time
  workflow_dispatch:

permissions:
  contents: write   # commit updated data file back to the repo

concurrency:
  group: scrape-trash
  cancel-in-progress: false

# Opt the JS-based actions into Node.js 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          HSY_SERVICE:  "BB11-012731-0"
          HSY_POSTAL:   "00410"
          HSY_CUSTOMER: "72603608934"
        run: python scripts/scrape_trash.py

      - name: Commit updated data if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain _data/trash.json)" ]]; then
            git add _data/trash.json
            git commit -m "chore(data): update trash pickup dates"
            git push
          else
            echo "No changes in _data/trash.json — nothing to commit."
          fi
