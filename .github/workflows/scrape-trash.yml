name: Scrape trash pickup dates

on:
  schedule:
    # Midnight Helsinki time. GitHub cron is UTC and doesn't know DST, so
    # 22:00 UTC = 00:00 EET (winter) / 01:00 EEST (summer). Close enough.
    - cron: "0 22 * * *" # daily at midnight Helsinki time
  workflow_dispatch:

permissions: {}   # no repo writes needed — data is published via artifact

concurrency:
  group: scrape-trash
  cancel-in-progress: false

# Opt the JS-based actions into Node.js 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          HSY_SERVICE:  ${{ vars.HSY_SERVICE }}
          HSY_POSTAL:   ${{ vars.HSY_POSTAL }}
          HSY_CUSTOMER: ${{ vars.HSY_CUSTOMER }}
        run: python scripts/scrape_trash.py

      - name: Upload trash data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trash-data
          path: _data/trash.json
          overwrite: true
