name: Build & deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Scrape trash pickup dates"]
    types: [completed]

# Allow only one concurrent deployment; skip in-flight runs but always let
# the latest queued run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read    # needed to download artifacts from the scraper workflow

# Opt the JS-based actions (checkout, configure-pages, upload-pages-artifact,
# deploy-pages, etc.) into Node.js 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Trash data ──────────────────────────────────────────────────────────
      # When triggered by the scraper workflow, download its artifact.
      # When triggered by a push or workflow_dispatch, run the scraper directly.

      - name: Download trash data from scraper workflow
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        uses: actions/download-artifact@v4
        with:
          name: trash-data
          path: _data/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python (scraper fallback)
        if: github.event_name != 'workflow_run'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies (scraper fallback)
        if: github.event_name != 'workflow_run'
        run: pip install -r scripts/requirements.txt

      - name: Run scraper (fallback for push / manual triggers)
        if: github.event_name != 'workflow_run'
        env:
          HSY_SERVICE:  "BB11-012731-0"
          HSY_POSTAL:   "00410"
          HSY_CUSTOMER: "72603608934"
        run: python scripts/scrape_trash.py
      # ────────────────────────────────────────────────────────────────────────

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
