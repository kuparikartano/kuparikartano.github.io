title: Kuparikartano
lang: fi

# Base URL. If you deploy to a project page like
#   https://<user>.github.io/<repo>/
# set baseurl to "/<repo>". Override in GitHub Actions if needed.
url: ""
baseurl: ""

permalink: /:title/

# Content pages live in content/. Each file carries an explicit permalink
# in its front matter so URLs stay the same as before. Subfolders inside
# content/ automatically become dropdown menus in the top nav
# (see _includes/nav.html).

# Jekyll build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-toc

# Sidebar TOC (pages opt in with `toc: true` in front matter).
toc:
  min_level: 1
  max_level: 2

# Exclude infra files from the build output
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts/
  - vendor/
  - .github/
  - node_modules/
