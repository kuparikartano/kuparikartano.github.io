<!doctype html>
<html lang="{{ site.lang | default: 'fi' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {% seo %}
  <!-- Bootstrap 5.3 (loaded first; the site's own CSS below overrides it where they collide).
       Add an `integrity="sha384-…"` from Bootstrap's docs if you want SRI. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% include nav.html %}
    </div>
  </header>

  <main class="wrap content{% if page.toc %} with-toc{% endif %}">
    <article class="content-main">
      {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
      {{ content }}
    </article>

    {%- if page.toc and content contains '<h' -%}
      <aside class="toc" aria-label="Sisällysluettelo">
        <h2 class="toc-title">Sisällys</h2>
      </aside>
    {%- endif -%}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        &copy; {{ site.time | date: '%Y' }} {{ site.title }}
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5.3 JS bundle (includes Popper) — needed for dropdowns,
       modals, tooltips, popovers, etc. Plain buttons don't require this. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  {% if page.toc %}
  <script>
    (function () {
      var aside = document.querySelector('aside.toc');
      if (!aside) return;
      var article = document.querySelector('.content-main');
      if (!article) return;

      var headings = Array.from(article.querySelectorAll('h1[id], h2[id], h3[id]'));
      if (!headings.length) return;

      var root = document.createElement('ul');
      root.id = 'toc';
      root.className = 'section-nav';

      var stack = [{ level: 0, ul: root }];

      headings.forEach(function (h) {
        var level = parseInt(h.tagName[1], 10);
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        var li = document.createElement('li');
        li.className = 'toc-entry toc-h' + level;
        li.appendChild(a);

        // Pop stack until we find a parent with smaller level
        while (stack.length > 1 && stack[stack.length - 1].level >= level) {
          stack.pop();
        }

        var parentUl = stack[stack.length - 1].ul;
        parentUl.appendChild(li);

        // Push a new ul context for children
        var childUl = document.createElement('ul');
        li.appendChild(childUl);
        stack.push({ level: level, ul: childUl });
      });

      // Remove empty trailing <ul> elements left by leaf headings
      root.querySelectorAll('ul:empty').forEach(function (el) { el.remove(); });

      aside.appendChild(root);
    })();
  </script>
  {% endif %}
</body>
</html>
