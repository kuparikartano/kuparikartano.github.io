<!doctype html>
<html lang="{{ site.lang | default: 'fi' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {% seo %}
  <!-- Bootstrap 5.3 (loaded first; the site's own CSS below overrides it where they collide).
       Add an `integrity="sha384-…"` from Bootstrap's docs if you want SRI. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% include nav.html %}
    </div>
  </header>

  <main class="wrap content{% if page.toc %} with-toc{% endif %}">
    <article class="content-main">
      {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
      {{ content }}
    </article>

    {%- if page.toc and content contains '<h' -%}
      <aside class="toc" aria-label="Sisällysluettelo">
        <h2 class="toc-title">Sisällys</h2>
        {{ content | toc_only }}
      </aside>
    {%- endif -%}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        &copy; {{ site.time | date: '%Y' }} {{ site.title }}
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5.3 JS bundle (includes Popper) — needed for dropdowns,
       modals, tooltips, popovers, etc. Plain buttons don't require this. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
